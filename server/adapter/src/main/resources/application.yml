server:
  port: 8080

spring:
  application:
    name: agent-ops
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/agentops?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

agentops:
  crypto:
    encryption-key: "XZwCZnFN+AzmS/6ekIBwBgBZnjFrWooOG3uGgOAP6ks="
  auth:
    token-ttl-seconds: 7200
    password-pattern: "^(?=.*[A-Za-z])(?=.*\\d).{8,}$"
